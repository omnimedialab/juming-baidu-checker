# /etc/nginx/conf.d/link113-notify.conf
# 反代 link.gamelinklab.com → 本地 127.0.0.1:3119

server {
    listen 80;
    server_name link.gamelinklab.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name link.gamelinklab.com;

    ssl_certificate     /etc/letsencrypt/live/link.gamelinklab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link.gamelinklab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 仅允许 link113 文档里给的回调 IP 命中 /notify
    # 文档：https://www.link113.com/openapi
    location = /notify {
        # allow 212.129.155.107;
        # deny all;
        proxy_pass http://127.0.0.1:3119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3119;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
